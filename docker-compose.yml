services:
  mysql:
    image: mysql:8.4
    container_name: event_calendar_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: event_calendar
      MYSQL_USER: app_user
      MYSQL_PASSWORD: Blaster!@
      MYSQL_ROOT_PASSWORD: Blaster!@
      TZ: America/Fortaleza
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  adminer:
    image: adminer:4
    container_name: event_calendar_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

volumes:
  mysql_data:
    driver: local

networks:
  app_network:
    driver: bridge
